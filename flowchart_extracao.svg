  <!-- center (400,640); half-w=90 half-h=24 -->
  <polygon points="400,616 490,640 400,664 310,640" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="400" y="644" text-anchor="middle" font-weight="bold">Erro HTTP?</text>

  <!-- Sim → left → erro_extracao -->
  <line x1="310" y1="640" x2="210" y2="640" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="259" y="634" text-anchor="middle" font-size="10.5" font-style="italic">Sim</text>
  <rect x="86" y="622" width="122" height="36" rx="5" fill="none" stroke="#000" stroke-width="1"/>
  <text x="147" y="640" text-anchor="middle" font-size="10" font-weight="bold">erro_extracao</text>
  <text x="147" y="652" text-anchor="middle" font-size="10">(return None)</text>

  <!-- Não → down -->
  <line x1="400" y1="664" x2="400" y2="686" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="408" y="679" font-size="10.5" font-style="italic">Não</text>

  <!-- ── N6  DIAMOND: is_article_page(soup)? ── -->
  <!-- center (400,712); half-w=120 half-h=28 -->
  <polygon points="400,684 520,712 400,740 280,712" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="400" y="707" text-anchor="middle" font-weight="bold">is_article_page</text>
  <text x="400" y="722" text-anchor="middle" font-weight="bold">(soup)?</text>

  <!-- Annotations right -->
  <text x="528" y="698" font-size="9" fill="#333">citation_title</text>
  <text x="528" y="710" font-size="9" fill="#333">og:title + div[data-anchor=Resumo]</text>
  <text x="528" y="722" font-size="9" fill="#333">article#articleText</text>
  <text x="528" y="734" font-size="9" fill="#333">div[data-anchor="Resumo"]</text>

  <!-- Sim → right → apply_missing -->
  <!-- We'll route Sim upward-right to avoid collision with annotations -->
  <!-- Actually route down-right: go to x=526 at y=712, then down to y=760, box at 602 -->
  <!-- Let's route via bottom-right of diamond -->
  <line x1="520" y1="712" x2="596" y2="712" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="556" y="706" text-anchor="middle" font-size="10.5" font-style="italic">Sim</text>

  <!-- apply_missing box  x=598..778 y=692..752 -->
  <rect x="598" y="692" width="180" height="60" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="688" y="710" text-anchor="middle" font-size="10" font-weight="bold">apply_missing(meta, body)</text>
  <text x="688" y="724" text-anchor="middle" font-size="10">Para cada campo em falta:</text>
  <text x="688" y="737" text-anchor="middle" font-size="10">1. meta tags (citation_*)</text>
  <text x="688" y="750" text-anchor="middle" font-size="10">2. corpo HTML (.article-title…)</text>

  <!-- apply_missing → down → merge at y=820 -->
  <line x1="688" y1="752" x2="688" y2="820" stroke="#000" stroke-width="1.2"/>
  <line x1="688" y1="820" x2="522" y2="820" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Não → down -->
  <line x1="400" y1="740" x2="400" y2="762" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="378" y="755" text-anchor="end" font-size="10.5" font-style="italic">Não</text>

  <!-- ── N7  DIAMOND: is_aop(pid)? ── -->
  <!-- center (400,786); half-w=90 half-h=24 -->
  <polygon points="400,762 490,786 400,810 310,786" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="400" y="790" text-anchor="middle" font-weight="bold">is_aop(pid)?</text>
  <text x="218" y="780" text-anchor="end" font-size="9" fill="#333">pid[14:17] == "005"</text>

  <!-- Não → down → merge at y=820 -->
  <line x1="400" y1="810" x2="400" y2="820" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="408" y="818" font-size="10.5" font-style="italic">Não</text>

  <!-- Sim → left → Etapa 4 AoP -->
  <line x1="310" y1="786" x2="210" y2="786" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="259" y="780" text-anchor="middle" font-size="10.5" font-style="italic">Sim</text>

  <!-- Etapa 4 box  x=20..208 y=756..830 -->
  <rect x="20" y="756" width="188" height="80" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="114" y="774" text-anchor="middle" font-size="10" font-weight="bold">Etapa 4 — AoP</text>
  <text x="114" y="788" text-anchor="middle" font-size="10">Extrair og:url da home</text>
  <text x="114" y="801" text-anchor="middle" font-size="10">Forçar lang=pt</text>
  <text x="114" y="814" text-anchor="middle" font-size="10">GET og:url → is_article_page?</text>
  <text x="114" y="827" text-anchor="middle" font-size="10">Sim → apply_missing()</text>

  <!-- Etapa 4 → down → merge at y=856 -->
  <line x1="114" y1="836" x2="114" y2="856" stroke="#000" stroke-width="1.2"/>
  <line x1="114" y1="856" x2="280" y2="856" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- merge at y=820 → down to N8 -->
  <line x1="400" y1="820" x2="400" y2="856" stroke="#000" stroke-width="1.2"/>
  <line x1="280"  y1="856" x2="400" y2="856" stroke="#000" stroke-width="1.2"/>
  <line x1="400" y1="856" x2="400" y2="876" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── N8  DIAMOND: Língua ≠ PT e faltam campos? ── -->
  <!-- center (400,904); half-w=130 half-h=30 -->
  <polygon points="400,874 530,904 400,934 270,904" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="400" y="898" text-anchor="middle" font-weight="bold">Língua ≠ PT</text>
  <text x="400" y="913" text-anchor="middle" font-weight="bold">e faltam campos?</text>

  <!-- Sim → right → Etapa 3 -->
  <line x1="530" y1="904" x2="610" y2="904" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="568" y="898" text-anchor="middle" font-size="10.5" font-style="italic">Sim</text>

  <!-- Etapa 3 box  x=612..790 y=876..944 -->
  <rect x="612" y="876" width="178" height="68" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="701" y="894" text-anchor="middle" font-size="10" font-weight="bold">Etapa 3 — Link PT</text>
  <text x="701" y="908" text-anchor="middle" font-size="10">_find_pt_link(soup)</text>
  <text x="701" y="921" text-anchor="middle" font-size="10">Procura href ?lang=pt</text>
  <text x="701" y="934" text-anchor="middle" font-size="10">GET link PT</text>
  <text x="701" y="947" text-anchor="middle" font-size="10">apply_missing()</text>

  <!-- Etapa 3 → down → merge at y=984 -->
  <line x1="701" y1="944" x2="701" y2="984" stroke="#000" stroke-width="1.2"/>
  <line x1="701" y1="984" x2="532" y2="984" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Não → down → merge at y=984 -->
  <line x1="400" y1="934" x2="400" y2="984" stroke="#000" stroke-width="1.2"/>
  <text x="408" y="962" font-size="10.5" font-style="italic">Não</text>
  <line x1="400" y1="984" x2="532" y2="984" stroke="#000" stroke-width="1.2"/>
  <line x1="400" y1="984" x2="400" y2="1004" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ════════════════════════════════════════════════════
       RESULTADO FINAL  y=1006..1120
  ════════════════════════════════════════════════════ -->
  <rect x="200" y="1006" width="400" height="114" rx="10"
        fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="400" y="1026" text-anchor="middle" font-weight="bold" font-size="12">Resultado Final</text>
  <line x1="210" y1="1032" x2="590" y2="1032" stroke="#000" stroke-width="0.8"/>

  <text x="400" y="1050" text-anchor="middle" font-size="11">T &#8743; R &#8743; KW &#160;&#x27F6;&#160; <tspan font-weight="bold">ok_completo</tspan></text>
  <text x="400" y="1068" text-anchor="middle" font-size="11">T &#8744; R &#8744; KW &#160;&#x27F6;&#160; <tspan font-weight="bold">ok_parcial</tspan></text>
  <text x="400" y="1086" text-anchor="middle" font-size="11">URL tentada, 0 campos &#160;&#x27F6;&#160; <tspan font-weight="bold">nada_encontrado</tspan></text>
  <text x="400" y="1104" text-anchor="middle" font-size="11">Falha de rede / HTTP &#160;&#x27F6;&#160; <tspan font-weight="bold">erro_extracao</tspan></text>

  <!-- ════════════════════════════════════════════════════
       PRIORITY TABLE  y=1136..1260
  ════════════════════════════════════════════════════ -->
  <rect x="10" y="1136" width="780" height="124" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="400" y="1155" text-anchor="middle" font-weight="bold" font-size="11">apply_missing() — Prioridade de fonte por campo</text>
  <line x1="18" y1="1160" x2="782" y2="1160" stroke="#000" stroke-width="0.7"/>

  <!-- header row -->
  <text x="40"  y="1176" font-size="10.5" font-weight="bold">Prioridade</text>
  <text x="160" y="1176" font-size="10.5" font-weight="bold">Fonte</text>
  <text x="310" y="1176" font-size="10.5" font-weight="bold">Selectores HTML</text>
  <line x1="18" y1="1180" x2="782" y2="1180" stroke="#000" stroke-width="0.5"/>

  <!-- row 1 -->
  <text x="40"  y="1197" font-size="10.5">1.ª  (preferida)</text>
  <text x="160" y="1197" font-size="10.5">Meta tags</text>
  <text x="310" y="1197" font-size="10" font-family="Courier New, monospace">citation_title &#183; citation_abstract &#183; citation_keywords</text>

  <!-- row 2 -->
  <text x="40"  y="1222" font-size="10.5">2.ª  (fallback)</text>
  <text x="160" y="1222" font-size="10.5">Corpo HTML</text>
  <text x="310" y="1222" font-size="10" font-family="Courier New, monospace">h1.article-title &#183; div[data-anchor=Resumo] p &#183; .keywords span</text>

  <line x1="18" y1="1232" x2="782" y2="1232" stroke="#000" stroke-width="0.5"/>

  <!-- note -->
  <text x="400" y="1248" text-anchor="middle" font-size="10" font-style="italic">A primeira fonte com valor vence; as restantes não são tentadas para esse campo.</text>

  <!-- ════════════════════════════════════════════════════
       CAPTION
  ════════════════════════════════════════════════════ -->
  <text x="400" y="1290" text-anchor="middle" font-size="11" font-style="italic">
    Figura 1 — Algoritmo de extração do SciELO Scraper v2.4.
  </text>
  <text x="400" y="1308" text-anchor="middle" font-size="11" font-style="italic">
    Fase 1: ArticleMeta API (ISIS-JSON). Fase 2: fallback HTML com quatro etapas de recuperação.
  </text>
  <text x="400" y="1326" text-anchor="middle" font-size="11" font-style="italic">
    AoP = Ahead of Print (pid[14:17] == "005"). T = Título; R = Resumo; KW = Palavras-chave.
  </text>

</svg>
