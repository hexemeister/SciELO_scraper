<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 1560" width="800" height="1560"
     font-family="'Times New Roman', Times, serif" font-size="12">

  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4" orient="auto">
      <polygon points="0 0, 9 4, 0 8" fill="#000"/>
    </marker>
  </defs>

  <!-- ─── background ─── -->
  <rect width="800" height="1560" fill="#fff"/>

  <!-- ════════════════════════════════════════════════════
       LEGEND  (top-left)
  ════════════════════════════════════════════════════ -->
  <rect x="10" y="10" width="220" height="114" fill="none" stroke="#000" stroke-width="1"/>
  <text x="18" y="27"  font-weight="bold" font-size="11">Legenda</text>
  <line x1="10" y1="31" x2="230" y2="31" stroke="#000" stroke-width="0.6"/>

  <!-- rect = processo -->
  <rect x="18" y="38" width="56" height="18" fill="none" stroke="#000" stroke-width="1"/>
  <text x="82" y="51"  font-size="10.5">Processo / Acção</text>

  <!-- diamond = decisão -->
  <polygon points="46,73 74,63 102,73 74,83" fill="none" stroke="#000" stroke-width="1"/>
  <text x="112" y="77" font-size="10.5">Decisão (Sim / Não)</text>

  <!-- rounded rect = resultado -->
  <rect x="18" y="92" width="56" height="18" rx="9" fill="none" stroke="#000" stroke-width="1"/>
  <text x="82" y="105" font-size="10.5">Início / Resultado final</text>

  <!-- ════════════════════════════════════════════════════
       CENTRE-LINE  x=400
  ════════════════════════════════════════════════════ -->

  <!-- ── N0  START ── -->
  <!-- y=10..40 -->
  <rect x="245" y="10" width="310" height="30" rx="15"
        fill="none" stroke="#000" stroke-width="1.5"/>
  <text x="400" y="30" text-anchor="middle" font-weight="bold">process_article(row)</text>

  <!-- arrow N0→N1 -->
  <line x1="400" y1="40" x2="400" y2="62" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── N1  clean_pid ── -->
  <!-- y=64..106 -->
  <rect x="252" y="64" width="296" height="42" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="400" y="81"  text-anchor="middle" font-weight="bold">clean_pid(raw_id)</text>
  <text x="400" y="95"  text-anchor="middle" font-size="10.5">strip · remove sufixo &#8209;scl / &#8209;oai</text>
  <text x="400" y="108" text-anchor="middle" font-size="10.5">valida regex: [A&#8209;Z]\d{4}&#8209;\d{3}[\dA&#8209;Z]\d{13}</text>

  <!-- arrow N1→N2 -->
  <line x1="400" y1="106" x2="400" y2="128" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── N2  DIAMOND: PID válido? ── -->
  <!-- center (400,150); half-w=100 half-h=26 -->
  <polygon points="400,124 500,150 400,176 300,150" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="400" y="154" text-anchor="middle" font-weight="bold">PID válido?</text>

  <!-- Não → left -->
  <line x1="300" y1="150" x2="190" y2="150" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="245" y="144" text-anchor="middle" font-size="10.5" font-style="italic">Não</text>
  <!-- terminal erro_pid_invalido -->
  <rect x="88" y="133" width="100" height="34" rx="5" fill="none" stroke="#000" stroke-width="1"/>
  <text x="138" y="152" text-anchor="middle" font-size="10" font-weight="bold">erro_pid</text>
  <text x="138" y="163" text-anchor="middle" font-size="10" font-weight="bold">_invalido</text>

  <!-- Sim → down -->
  <line x1="400" y1="176" x2="400" y2="198" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="408" y="191" font-size="10.5" font-style="italic">Sim</text>

  <!-- ════════════════════════════════════════════════════
       FASE 1 — ArticleMeta API  dashed box  y=200..268
  ════════════════════════════════════════════════════ -->
  <rect x="112" y="200" width="576" height="68" fill="none" stroke="#000"
        stroke-width="1.4" stroke-dasharray="6,3"/>
  <text x="400" y="218" text-anchor="middle" font-weight="bold" font-size="12">FASE 1 — ArticleMeta API</text>
  <text x="400" y="233" text-anchor="middle" font-size="10.5" font-style="italic">(saltada se &#8209;&#8209;only&#8209;html)</text>
  <text x="400" y="250" text-anchor="middle" font-size="10.5">GET articlemeta.scielo.org/api/v1/article</text>
  <text x="400" y="264" text-anchor="middle" font-size="10.5">?code={pid} &amp;collection={col} &amp;format=json</text>

  <!-- arrow →N3 -->
  <line x1="400" y1="268" x2="400" y2="290" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── N3  DIAMOND: Dados PT na API? ── -->
  <!-- center (400,316); half-w=120 half-h=28 -->
  <polygon points="400,288 520,316 400,344 280,316" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="400" y="311" text-anchor="middle" font-weight="bold">Dados PT</text>
  <text x="400" y="326" text-anchor="middle" font-weight="bold">na API?</text>

  <!-- Sim → right → extract box -->
  <line x1="520" y1="316" x2="600" y2="316" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="558" y="310" text-anchor="middle" font-size="10.5" font-style="italic">Sim</text>

  <!-- extract_pt_from_isis box  x=602..780 y=296..348 -->
  <rect x="602" y="296" width="176" height="52" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="690" y="313" text-anchor="middle" font-size="10" font-weight="bold">extract_pt_from_isis()</text>
  <text x="690" y="327" text-anchor="middle" font-size="10">titles · abstracts · keywords</text>
  <text x="690" y="341" text-anchor="middle" font-size="10">filtra lang == "pt"</text>

  <!-- extract → down → merge at y=388 -->
  <line x1="690" y1="348" x2="690" y2="388" stroke="#000" stroke-width="1.2"/>
  <line x1="690" y1="388" x2="520" y2="388" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Não → down → merge at y=388 -->
  <line x1="400" y1="344" x2="400" y2="364" stroke="#000" stroke-width="1.2"/>
  <text x="408" y="358" font-size="10.5" font-style="italic">Não</text>
  <line x1="400" y1="364" x2="280" y2="364" stroke="#000" stroke-width="1.2"/>
  <line x1="280" y1="364" x2="280" y2="388" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── N4  DIAMOND: T · R · KW completos? ── -->
  <!-- center (400,412); half-w=120 half-h=26 -->
  <polygon points="400,386 520,412 400,438 280,412" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="400" y="407" text-anchor="middle" font-weight="bold">T · R · KW</text>
  <text x="400" y="422" text-anchor="middle" font-weight="bold">completos?</text>

  <!-- Todos → right → ok_completo via API -->
  <line x1="520" y1="412" x2="600" y2="412" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="558" y="406" text-anchor="middle" font-size="10.5" font-style="italic">Todos</text>
  <rect x="602" y="396" width="130" height="32" rx="5" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="667" y="413" text-anchor="middle" font-size="10" font-weight="bold">ok_completo</text>
  <text x="667" y="424" text-anchor="middle" font-size="10">(via API)</text>

  <!-- Parcial/Não → down -->
  <line x1="400" y1="438" x2="400" y2="460" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="355" y="453" text-anchor="middle" font-size="10.5" font-style="italic">Parcial / Não</text>

  <!-- ════════════════════════════════════════════════════
       FASE 2 — Fallback HTML  dashed box  y=462..522
  ════════════════════════════════════════════════════ -->
  <rect x="112" y="462" width="576" height="60" fill="none" stroke="#000"
        stroke-width="1.4" stroke-dasharray="6,3"/>
  <text x="400" y="480" text-anchor="middle" font-weight="bold" font-size="12">FASE 2 — Fallback HTML</text>
  <text x="400" y="495" text-anchor="middle" font-size="10.5" font-style="italic">(saltada se &#8209;&#8209;only&#8209;api  OU  se todos os campos já preenchidos)</text>
  <text x="400" y="512" text-anchor="middle" font-size="10.5">Campos em falta: need_t · need_r · need_k</text>

  <!-- arrow → Etapa 1 -->
  <line x1="400" y1="522" x2="400" y2="544" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- ── Etapa 1 — URL Legacy ── y=546..596 -->
  <rect x="228" y="546" width="344" height="50" fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="400" y="564" text-anchor="middle" font-weight="bold">Etapa 1 — URL Legacy</text>
  <text x="400" y="579" text-anchor="middle" font-size="10.5">GET scielo.br?script=sci_arttext&amp;pid={pid}&amp;lang=pt</text>
  <text x="400" y="593" text-anchor="middle" font-size="10.5">requests segue redirect automático</text>

  <!-- arrow →N5 -->
  <line x1="400" y1="596" x2="400" y2="618" stroke="#000" stroke-width="1.2" marker-end="url(#arr)"/>

